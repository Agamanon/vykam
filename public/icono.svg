<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="gradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="gradLightIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Fondo del icono -->
  <rect x="10" y="10" width="100" height="100" rx="22" ry="22" fill="url(#gradIcon)"/>

  <!-- Decoración interna -->
  <path d="M 10 32 Q 10 10 32 10 L 60 10 L 10 60 Z" fill="url(#gradLightIcon)" opacity="0.15"/>

  <!-- Letra V -->
  <path d="M 32 34 L 60 90 L 88 34"
        stroke="white"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Punto decorativo -->
  <circle cx="60" cy="90" r="5" fill="white"/>
</svg>
